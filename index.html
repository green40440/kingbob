<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cookie Puncher — cookiepuncher.fun</title>
  <meta name="description" content="Cookie Puncher — click cookies, buy upgrades, and build a cookie empire.">
  <style>
    /* --- SKIN DEFINITIONS --- */
    :root{
      --bg1: #0b1020; --bg2: #151a30; 
      --accent1: #ffc857; --accent2:#ff9e57; 
      --muted:#a0aec0;
      --glass: rgba(255,255,255,0.04);
      --site-shadow: 0 10px 40px rgba(2,6,23,0.6);
      --cookie-color: linear-gradient(180deg,var(--accent1),var(--accent2));
      --cookie-shadow: 0 10px 30px rgba(0,0,0,0.45);
      --tab-bg: #151a30;
    }

    body.skin-Midnight { --bg1: #1a1a1a; --bg2: #2d2d2d; --accent1: #95d4d4; --accent2:#66b2b2; --muted:#c0c0c0; --glass: rgba(0,0,0,0.2); --site-shadow: 0 10px 40px rgba(0,0,0,0.9); --cookie-color: linear-gradient(180deg,#e0e0e0,#b0b0b0); --cookie-shadow: 0 10px 30px rgba(0,0,0,0.7); --tab-bg: #2d2d2d; }
    body.skin-Forest { --bg1: #1E3A24; --bg2: #2B5433; --accent1: #A4D46C; --accent2:#6CA443; --muted:#C8DBC5; --glass: rgba(0,0,0,0.15); --site-shadow: 0 10px 40px rgba(30,58,36,0.6); --cookie-color: linear-gradient(180deg,#E7CF9C, #C3A675); --cookie-shadow: 0 10px 30px rgba(30,58,36,0.8); --tab-bg: #2B5433; }
    body.skin-Lava { --bg1: #180505; --bg2: #380808; --accent1: #FF4500; --accent2:#FF8C00; --muted:#ffc0cb; --glass: rgba(255, 69, 0, 0.1); --site-shadow: 0 10px 40px rgba(255,69,0,0.3); --cookie-color: linear-gradient(180deg,#303030,#101010); --cookie-shadow: 0 10px 30px rgba(255,69,0,0.45); --tab-bg: #380808; }
    body.skin-Ocean { --bg1: #0A3D62; --bg2: #165E87; --accent1: #6EBFB9; --accent2:#4AA49D; --muted:#B0E0E6; --glass: rgba(255,255,255,0.1); --site-shadow: 0 10px 40px rgba(10,61,98,0.7); --cookie-color: linear-gradient(180deg, #FFD700, #FFA500); --cookie-shadow: 0 10px 30px rgba(0,0,0,0.6); --tab-bg: #165E87; }
    body.skin-Gold { --bg1: #3D3D3A; --bg2: #5B5B58; --accent1: #FFD700; --accent2:#DAA520; --muted:#EEDD82; --glass: rgba(255,215,0,0.1); --site-shadow: 0 10px 40px rgba(255,215,0,0.3); --cookie-color: linear-gradient(180deg,#DAA520, #B8860B); --cookie-shadow: 0 10px 30px rgba(255,215,0,0.5); --tab-bg: #5B5B58; }
    body.skin-Retro { --bg1: #1B263B; --bg2: #2B3A5A; --accent1: #FF69B4; --accent2:#FF1493; --muted:#00FFFF; --glass: rgba(255,105,180,0.1); --site-shadow: 0 10px 40px rgba(0,0,0,0.8); --cookie-color: linear-gradient(180deg,#FFD700, #FF6347); --cookie-shadow: 0 10px 30px rgba(255,105,180,0.5); --tab-bg: #2B3A5A; }
    body.skin-Contrast { --bg1: #000000; --bg2: #111111; --accent1: #39FF14; --accent2:#00CC00; --muted:#FFFFFF; --glass: rgba(57, 255, 20, 0.08); --site-shadow: 0 10px 40px rgba(57, 255, 20, 0.3); --cookie-color: linear-gradient(180deg, #FFFFFF, #E0E0E0); --cookie-shadow: 0 10px 30px rgba(57, 255, 20, 0.5); --tab-bg: #111111; }
    body.skin-Space { --bg1: #000033; --bg2: #191970; --accent1: #FFCC00; --accent2:#FF9933; --muted:#A9A9A9; --glass: rgba(255, 255, 255, 0.05); --site-shadow: 0 10px 40px rgba(0, 0, 51, 0.9); --cookie-color: radial-gradient(circle, #FFFFFF, #B0C4DE); --cookie-shadow: 0 10px 30px rgba(255, 204, 0, 0.6); --tab-bg: #191970; }
    body.skin-Hacker { --bg1: #000000; --bg2: #001A00; --accent1: #00FF00; --accent2:#33FF33; --muted:#00AA00; --glass: rgba(0, 255, 0, 0.08); --site-shadow: 0 10px 40px rgba(0, 255, 0, 0.5); --cookie-color: linear-gradient(180deg, #FFFFFF, #DDDDDD); --cookie-shadow: 0 10px 30px rgba(0, 255, 0, 0.7); --tab-bg: #001A00; }

    /* --- BASE STYLES --- */
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,sans-serif;overflow-x:hidden;}
    body{background: linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 100%); color:#fff; display:flex; align-items:center; justify-content:center; padding:24px; transition: background 0.5s ease;}
    .site{width:100%; max-width:1100px; border-radius:14px; padding:18px; background:rgba(255,255,255,0.02); box-shadow:var(--site-shadow); padding-bottom: 100px;}
    header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 20px;}
    .brand{display:flex; gap:12px; align-items:center}
    .logo{width:56px;height:56px;border-radius:10px;background:linear-gradient(135deg,var(--accent1),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:28px; color:#000; font-weight:700;}
    h1{margin:0;font-size:1.35rem;color:var(--accent1)}
    .left{padding:14px;background:var(--glass); border-radius:12px; text-align: center;}
    #cookieButton{width:200px;height:200px;border-radius:50%;border:none; background:var(--cookie-color); font-size:3.6rem; cursor:pointer; box-shadow:var(--cookie-shadow); display:block;margin:14px auto;transition:transform .08s}
    #cookieButton:active{transform:scale(.92)}
    #superCookie{display:none;width:100px;height:100px;border-radius:50%;border:none; background:radial-gradient(circle, #ff00ff, #ff9900); font-size:2rem; cursor:pointer; margin:10px auto; animation:glow 1s infinite alternate;}
    @keyframes glow{from{box-shadow:0 0 10px #ff00ff;}to{box-shadow:0 0 25px #ff9900;}}
    .stats .big{font-size:1.5rem; font-weight: bold; margin-top:8px}
    .cps{color:var(--muted); font-size:1rem}

    /* --- TABS SYSTEM --- */
    .right-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 70px; background: var(--tab-bg); display: flex; justify-content: center; align-items: center; z-index: 1001; }
    .tabs-container { display: flex; gap: 20px; }
    .tab-button { background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 10px; font-weight: bold; }
    .tab-button.active { color: var(--accent1); border-bottom: 2px solid var(--accent1); }
    #tabOverlay { position: fixed; bottom: 70px; left: 0; width: 100%; background: var(--tab-bg); max-height: 60vh; overflow-y: auto; padding: 20px; display: none; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1); }
    #tabOverlay.active { display: block; }

    .shop-item { display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 10px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; }
    .shop-item:hover { background: rgba(255,255,255,0.05); }
    .skin-selector { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .skin-btn { padding: 10px; background: var(--glass); border: 1px solid var(--muted); color: #fff; cursor: pointer; border-radius: 5px; }
    .btn { background: var(--accent1); color: #000; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; margin: 5px; font-weight: bold;}
  </style>
</head>
<body>
  <div class="site">
    <header>
      <div class="brand">
        <div class="logo">🍪</div>
        <div>
          <h1>Cookie Puncher</h1>
          <p style="margin:0; color:var(--muted)">V11.0 Gold Edition</p>
        </div>
      </div>
    </header>

    <main class="left">
      <div class="stats">
        <button id="cookieButton">🍪</button>
        <button id="superCookie">🌟</button>
        <div id="score" class="big">Cookies: 0</div>
        <div id="cps" class="cps">CPS: 0</div>
        <div id="discountTimer" style="color:var(--accent1); font-weight:bold"></div>
        <div class="controls">
          <button class="btn" id="saveBtn">Save Game</button>
          <button class="btn" id="resetBtn">Reset</button>
        </div>
      </div>
    </main>
  </div>

  <div id="tabOverlay">
    <div id="shopContent">
      <h3 style="color:var(--accent1)">🛒 Shop (Click to buy)</h3>
      <div id="shopList"></div>
    </div>
    <div id="skinsContent" style="display:none">
      <h3 style="color:var(--accent1)">🎨 Skins</h3>
      <div class="skin-selector" id="skinSelector"></div>
    </div>
  </div>

  <div class="right-bar">
    <div class="tabs-container">
      <button class="tab-button active" onclick="showTab('shop')">SHOP</button>
      <button class="tab-button" onclick="showTab('skins')">SKINS</button>
      <button class="tab-button" onclick="toggleOverlay()">CLOSE/OPEN</button>
    </div>
  </div>

  <script>
    const ITEMS = [
      { id: 0, name: "Cursor", baseCost: 15, cps: 1 },
      { id: 1, name: "Grandma", baseCost: 100, cps: 5 },
      { id: 2, name: "Farm", baseCost: 1100, cps: 20 },
      { id: 3, name: "Factory", baseCost: 12000, cps: 100 },
      { id: 4, name: "Cookie Bank", baseCost: 50000, cps: 500 }
    ];

    const SKINS = ["Classic", "Midnight", "Forest", "Lava", "Ocean", "Gold", "Retro", "Contrast", "Space", "Hacker"];

    let state = {
      cookies: 0,
      owned: new Array(ITEMS.length).fill(0),
      discountActive: false,
      discountTime: 0,
      currentSkin: "Classic"
    };

    function save() { localStorage.setItem('cookie_save', JSON.stringify(state)); }
    function load() {
      const saved = localStorage.getItem('cookie_save');
      if (saved) state = JSON.parse(saved);
      applySkin(state.currentSkin);
      renderShop();
    }

    function applySkin(s) {
      document.body.className = s === "Classic" ? "" : "skin-" + s;
      state.currentSkin = s;
    }

    function getCPS() {
      return ITEMS.reduce((acc, item, i) => acc + (item.cps * state.owned[i]), 0);
    }

    function getCost(index) {
      let base = ITEMS[index].baseCost * Math.pow(1.15, state.owned[index]);
      return state.discountActive ? base * 0.5 : base;
    }

    function renderShop() {
      const list = document.getElementById('shopList');
      list.innerHTML = ITEMS.map((item, i) => `
        <div class="shop-item" onclick="buy(${i})">
          <span>${item.name} (x${state.owned[i]})</span>
          <span>Price: ${Math.floor(getCost(i))} 🍪</span>
        </div>
      `).join('');
    }

    function buy(i) {
      const cost = getCost(i);
      if (state.cookies >= cost) {
        state.cookies -= cost;
        state.owned[i]++;
        renderShop();
      }
    }

    document.getElementById('cookieButton').onclick = () => {
      state.cookies += 1;
      updateUI();
    };

    function updateUI() {
      document.getElementById('score').innerText = `Cookies: ${Math.floor(state.cookies)}`;
      document.getElementById('cps').innerText = `CPS: ${getCPS()}`;
      if(state.discountActive) {
          document.getElementById('discountTimer').innerText = `SALE: ${state.discountTime}s`;
      } else {
          document.getElementById('discountTimer').innerText = "";
      }
    }

    function showTab(type) {
      document.getElementById('shopContent').style.display = type === 'shop' ? 'block' : 'none';
      document.getElementById('skinsContent').style.display = type === 'skins' ? 'block' : 'none';
      document.getElementById('tabOverlay').classList.add('active');
    }

    function toggleOverlay() {
      document.getElementById('tabOverlay').classList.toggle('active');
    }

    // Initialize Skins
    const skinContainer = document.getElementById('skinSelector');
    SKINS.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'skin-btn';
      btn.innerText = s;
      btn.onclick = () => applySkin(s);
      skinContainer.appendChild(btn);
    });

    // Game Loop
    setInterval(() => {
      state.cookies += (getCPS() / 10);
      if (state.discountActive) {
        state.discountTime--;
        if (state.discountTime <= 0) state.discountActive = false;
      }
      // Super Cookie Spawn Logic (1% chance every second)
      if (Math.random() < 0.01 && !state.discountActive) {
        document.getElementById('superCookie').style.display = 'block';
      }
      updateUI();
    }, 100);

    document.getElementById('superCookie').onclick = function() {
      state.discountActive = true;
      state.discountTime = 30;
      this.style.display = 'none';
      renderShop();
    };

    document.getElementById('saveBtn').onclick = save;
    document.getElementById('resetBtn').onclick = () => { localStorage.clear(); location.reload(); };

    load();
  </script>
</body>
</html>
